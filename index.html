<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>吉他谱</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Heiti SC', sans-serif;
      padding: 16px 16px 48px;
    }
    header { text-align: center; padding: 16px 0 12px; }
    header h1 { font-size: 22px; font-weight: 700; color: #fff; }

    /* Song selector */
    .song-selector {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin: 0 0 16px;
    }
    .song-btn {
      background: #16213e; border: 1px solid #0f3460;
      border-radius: 8px; padding: 6px 16px;
      font-size: 14px; color: #888; cursor: pointer;
      font-family: inherit;
    }
    .song-btn.active { background: #0f3460; color: #fff; border-color: #e94560; }

    .song.hidden { display: none; }

    /* Song header */
    .song-header { text-align: center; margin-bottom: 12px; }
    .song-header h2 { font-size: 20px; font-weight: 700; color: #fff; }
    .song-header .artist { font-size: 13px; color: #888; margin-top: 3px; }
    .song-header .meta { font-size: 11px; color: #555; margin-top: 4px; }

    /* Transpose */
    .transpose-ctrl {
      display: flex; align-items: center; gap: 14px;
      justify-content: center; margin-top: 10px;
    }
    .trans-btn {
      background: #16213e; border: 1px solid #0f3460;
      border-radius: 6px; width: 32px; height: 32px;
      font-size: 20px; color: #e94560; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: inherit; line-height: 1; padding: 0;
    }
    .trans-btn:active { background: #0f3460; }
    .trans-label { font-size: 13px; color: #888; min-width: 52px; text-align: center; }
    .easy-btn { border-color: #166534; width: auto; padding: 0 12px; font-size: 13px; font-weight: 700; }
    .easy-btn:active { background: #166534; }

    /* Chord bar */
    .chord-bar {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin: 12px 0 20px;
    }
    .chord-pill {
      background: #16213e; border: 1px solid #0f3460;
      border-radius: 8px; padding: 5px 14px;
      font-size: 14px; font-weight: 600; color: #e94560; cursor: pointer;
    }

    .lyrics-section { max-width: 520px; margin: 0 auto; }
    .section-title {
      font-size: 11px; color: #555;
      text-transform: uppercase; letter-spacing: 1px;
      margin: 20px 0 8px;
    }
    .lyric-line { margin-bottom: 14px; }
    .seg {
      display: inline-flex; flex-direction: column;
      vertical-align: bottom; white-space: nowrap;
    }
    .c {
      font-size: 12px; font-weight: 700; color: #e94560;
      line-height: 1.6; min-height: 1.6em;
      cursor: pointer; padding-right: 4px;
    }
    .c[data-chord]:hover { opacity: 0.8; }
    .w { font-size: 17px; line-height: 1.6; color: #ddd; white-space: nowrap; }

    /* Modal */
    .modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.8); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal.show { display: flex; }
    .modal-card {
      background: #16213e; border-radius: 16px;
      padding: 20px 24px 24px; text-align: center;
      min-width: 210px; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .modal-card h3 { font-size: 26px; color: #e94560; margin-bottom: 14px; }
    .modal-card .desc { font-size: 12px; color: #888; margin-top: 10px; }
    .modal-card .hint { font-size: 11px; color: #444; margin-top: 14px; }
  </style>
</head>
<body>

<header><h1>🎸 吉他谱</h1></header>

<div class="song-selector" id="song-selector"></div>
<div id="songs-container"></div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-card" id="modal-card"></div>
</div>

<script src="js/chords.js"></script>
<script src="js/songs.js"></script>
<script src="js/app.js"></script>
</body>
</html>
