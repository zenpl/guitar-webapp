<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>吉他谱</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Heiti SC', sans-serif;
      padding: 16px 16px 48px;
    }
    header { text-align: center; padding: 16px 0 12px; }
    header h1 { font-size: 22px; font-weight: 700; color: #fff; }

    /* Song selector */
    .song-selector {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin: 0 0 16px;
    }
    .song-btn {
      background: #16213e; border: 1px solid #0f3460;
      border-radius: 8px; padding: 6px 16px;
      font-size: 14px; color: #888; cursor: pointer;
      font-family: inherit;
    }
    .song-btn.active { background: #0f3460; color: #fff; border-color: #e94560; }

    .song.hidden { display: none; }

    /* Song header */
    .song-header { text-align: center; margin-bottom: 12px; }
    .song-header h2 { font-size: 20px; font-weight: 700; color: #fff; }
    .song-header .artist { font-size: 13px; color: #888; margin-top: 3px; }
    .song-header .meta { font-size: 11px; color: #555; margin-top: 4px; }

    /* Transpose */
    .transpose-ctrl {
      display: flex; align-items: center; gap: 14px;
      justify-content: center; margin-top: 10px;
    }
    .trans-btn {
      background: #16213e; border: 1px solid #0f3460;
      border-radius: 6px; width: 32px; height: 32px;
      font-size: 20px; color: #e94560; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: inherit; line-height: 1; padding: 0;
    }
    .trans-btn:active { background: #0f3460; }
    .trans-label { font-size: 13px; color: #888; min-width: 52px; text-align: center; }
    .easy-btn { border-color: #166534; width: auto; padding: 0 12px; font-size: 13px; font-weight: 700; }
    .easy-btn:active { background: #166534; }

    /* Chord bar */
    .chord-bar {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin: 12px 0 20px;
    }
    .chord-pill {
      background: #16213e; border: 1px solid #0f3460;
      border-radius: 8px; padding: 5px 14px;
      font-size: 14px; font-weight: 600; color: #e94560; cursor: pointer;
    }

    .lyrics-section { max-width: 520px; margin: 0 auto; }
    .section-title {
      font-size: 11px; color: #555;
      text-transform: uppercase; letter-spacing: 1px;
      margin: 20px 0 8px;
    }
    .lyric-line { margin-bottom: 14px; }
    .seg {
      display: inline-flex; flex-direction: column;
      vertical-align: bottom; white-space: nowrap;
    }
    .c {
      font-size: 12px; font-weight: 700; color: #e94560;
      line-height: 1.6; min-height: 1.6em;
      cursor: pointer; padding-right: 4px;
    }
    .c[data-chord]:hover { opacity: 0.8; }
    .w { font-size: 17px; line-height: 1.6; color: #ddd; white-space: nowrap; }
    /* 和弦落点：只有第一个字加下划线 */
    .w-mark { text-decoration: underline; text-decoration-color: #888; text-underline-offset: 4px; }
    /* 空词和弦：一个字宽的下划线空格，高度对齐 .w */
    .w-empty { display: inline-block; width: 1em; font-size: 17px; line-height: 1.6; height: 1.6em; border-bottom: 2px solid #aaa; box-sizing: border-box; }

    /* 版本 & 锁定 */
    .ver-badge {
      font-size: 10px; font-weight: 600; padding: 2px 6px;
      border-radius: 4px; margin-left: 6px; vertical-align: middle;
      background: #1a1a2e; color: #555; border: 1px solid #333;
    }
    .lock-btn {
      background: none; border: 1px solid #333; border-radius: 6px;
      color: #555; font-size: 13px; padding: 2px 8px; cursor: pointer;
      margin-left: 8px; vertical-align: middle;
    }
    .lock-btn:hover { border-color: #e94560; color: #e94560; }
    .lock-btn.locked { border-color: #4ade80; color: #4ade80; }

    /* 编辑模式 */
    .edit-btn {
      background: none; border: 1px solid #333; border-radius: 6px;
      color: #555; font-size: 13px; padding: 2px 8px; cursor: pointer;
      margin-left: 8px; vertical-align: middle;
    }
    .edit-btn.active { border-color: #facc15; color: #facc15; }
    .song.edit-mode .seg { cursor: pointer; outline: 1px dashed #333; border-radius: 2px; }
    .song.edit-mode .seg:hover { outline-color: #facc15; background: rgba(250,204,21,0.07); }
    .song.edit-mode .seg.picked { outline: 2px solid #facc15; background: rgba(250,204,21,0.15); }
    .song.edit-mode .seg.picked .c { color: #facc15; }
    /* 移动栏 */
    .move-bar {
      display: none; position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%);
      z-index: 200; background: #16213e; border: 1px solid #facc15;
      border-radius: 12px; padding: 8px 16px; gap: 12px;
      align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .move-bar.show { display: flex; }
    .move-bar button {
      background: #0f3460; border: 1px solid #333; border-radius: 8px;
      color: #fff; font-size: 18px; padding: 4px 14px; cursor: pointer;
    }
    .move-bar button:disabled { opacity: 0.3; }
    .move-bar button:hover:not(:disabled) { border-color: #facc15; }
    #move-bar-chord { color: #facc15; font-weight: 700; font-size: 16px; min-width: 40px; text-align: center; }
    #move-done { font-size: 16px; color: #4ade80; border-color: #166534; }

    .diff-fab {
      position: fixed; bottom: 24px; right: 24px; z-index: 200;
      background: #facc15; color: #000; font-weight: 700;
      border: none; border-radius: 12px; padding: 10px 20px;
      font-size: 14px; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      display: none;
    }
    .diff-fab.show { display: block; }
    /* 编辑弹窗 */
    .edit-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); z-index: 300;
      align-items: center; justify-content: center;
    }
    .edit-modal.show { display: flex; }
    .edit-card {
      background: #16213e; border-radius: 14px; padding: 20px 24px;
      min-width: 280px; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .edit-card h4 { font-size: 13px; color: #888; margin-bottom: 12px; }
    .edit-card label { display: block; font-size: 12px; color: #aaa; margin-bottom: 4px; }
    .edit-card input {
      width: 100%; background: #0f3460; border: 1px solid #333; border-radius: 6px;
      color: #fff; font-size: 15px; padding: 6px 10px; margin-bottom: 12px; box-sizing: border-box;
    }
    .edit-card-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .edit-card-btns button {
      border: none; border-radius: 6px; padding: 6px 16px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn-cancel { background: #1a1a2e; color: #888; }
    .btn-apply  { background: #facc15; color: #000; }

    /* Modal */
    .modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.8); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal.show { display: flex; }
    .modal-card {
      background: #16213e; border-radius: 16px;
      padding: 20px 24px 24px; text-align: center;
      min-width: 210px; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .modal-card h3 { font-size: 26px; color: #e94560; margin-bottom: 14px; }
    .modal-card .desc { font-size: 12px; color: #888; margin-top: 10px; }
    .modal-card .hint { font-size: 11px; color: #444; margin-top: 14px; }
  </style>
</head>
<body>

<header><h1>🎸 吉他谱</h1></header>

<div class="song-selector" id="song-selector"></div>
<div id="songs-container"></div>

<!-- Chord Modal -->
<div class="modal" id="modal">
  <div class="modal-card" id="modal-card"></div>
</div>

<!-- Edit Modal -->
<div class="edit-modal" id="edit-modal">
  <div class="edit-card">
    <h4 id="edit-title">编辑 seg</h4>
    <label>和弦</label>
    <input id="edit-chord" placeholder="空 = 无和弦">
    <label>歌词</label>
    <input id="edit-lyric" placeholder="空 = 空拍">
    <div class="edit-card-btns">
      <button class="btn-cancel" id="edit-cancel">取消</button>
      <button class="btn-apply"  id="edit-apply">应用</button>
    </div>
  </div>
</div>

<!-- Move Bar -->
<div class="move-bar" id="move-bar">
  <button id="move-left">◀</button>
  <span id="move-bar-chord"></span>
  <button id="move-right">▶</button>
  <button id="move-done">✓</button>
</div>

<!-- Diff FAB -->
<button class="diff-fab" id="diff-fab">📋 复制 diff</button>

<script src="js/chords.js?v=3"></script>
<script src="js/songs.js?v=3"></script>
<script src="js/app.js?v=3"></script>
</body>
</html>
