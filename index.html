<!DOCTYPE html>
<html>
<head>
  <title>南山南 - 马頔</title>
  <style>
    body {
      font-family: sans-serif;
    }
    .chord {
      display: inline-block;
      margin-right: 10px;
    }
  </style>
</head>
<body>
  <h1>南山南</h1>
  <h2>马頔</h2>

  <h3>和弦</h3>
  <div class="chords">
    <div class="chord">
      <h4>G</h4>
      <p>G大调</p>
      </div>
    <div class="chord">
      <h4>Em</h4>
      <p>Em小调 - 开放和弦</p>
       <pre>
       e|--0--
       B|--0--
       G|--0--
       D|--2--
       A|--2--
       E|--0--
       </pre>
    </div>
   <div class="chord">
      <h4>C</h4>
      <p>C大调</p>
       </div>
    <div class="chord">
      <h4>D</h4>
      <p>D大调</p>
       </div>
  </div>

  <h3>歌词</h3>
  <p>
    G     Em<br>
    你在南方的艳阳里 大雪纷飞<br>
    C     D<br>
    我在北方的寒夜里 四季如春<br>
    G     Em<br>
    如果天黑之前 来得及<br>
    C     D<br>
    我要忘了你的 眼睛<br>
    G     Em<br>
    南山南北秋悲 北海北西城以西<br>
    C     D<br>
    她在东北角的东北角 痛哭流涕
  </p>

</body>
</html>
